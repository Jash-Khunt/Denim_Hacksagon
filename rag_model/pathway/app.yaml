################
# Data Sources.#
################

$sources:
  # File System connector, reading data locally.
  - !pw.io.fs.read 
    path: data
    # path: client
    # path: date
    format: binary
    with_metadata: true

  # Google Drive connector
  # - !pw.io.gdrive.read
  #   object_id: $DIGITAL_DRIVE_ID
  #   service_user_credentials_file: $GOOGLE_APPLICATION_CREDENTIALS
  #   file_name_pattern:
  #     - "*.pdf"
  #     - "*.pptx"
  #     - "*.xlsx"
  #   object_size_limit: null
  #   with_metadata: true
  #   refresh_interval: 30

#######################################
# LLM from both HugginFace and Ollama.#
#######################################

$llm:
  !pw.xpacks.llm.llms.LiteLLMChat # model: "huggingface/meta-llama/Llama-3.1-8B-Instruct"
  model: "huggingface/openai/gpt-oss-120b"
  # model: "huggingface/deepseek-ai/DeepSeek-V3"
  # model: "ollama/mistral:latest"
  retry_strategy: !pw.udfs.ExponentialBackoffRetryStrategy
    max_retries: 6
  cache_strategy: !pw.udfs.DefaultCache {}
  temperature: 0.2
  capacity: 8
  async_mode: "fully_async"

####################################################################
# Specifies the embedder model for converting text into embeddings.#
####################################################################

# Using SentenceTransformer embedder with HuggingFace model

# $embedder: !pw.xpacks.llm.embedders.LiteLLMEmbedder
# model: "ollama/nomic-embed-text:latest"

$embedder: !pw.xpacks.llm.embedders.SentenceTransformerEmbedder
  model: "sentence-transformers/multi-qa-mpnet-base-dot-v1"
  call_kwargs:
    show_progress_bar: False

#######################################################################
# Defines the splitter settings for dividing text into smaller chunks.#
#######################################################################

# $splitter: !pw.xpacks.llm.splitters.TokenCountSplitter
#   max_tokens: 1500

$splitter: !pw.xpacks.llm.splitters.RecursiveSplitter
  chunk_size: 4000
  chunk_overlap: 800
  separators:
    - "\f"
    - "\n\n"
    - "\n"

# $splitter: !pw.xpacks.llm.splitters.NullSplitter
#   cache_strategy: !pw.udfs.DefaultCache {}

##################################################################################
# Configures the parser for processing and extracting information from documents.#
##################################################################################

# Using DoclingParser
# $parser: !pw.xpacks.llm.parsers.DoclingParser
#   table_parsing_strategy: "docling"
#   async_mode: "fully_async"
#   chunk: false
#   cache_strategy: !pw.udfs.DefaultCache {}
$parser: !pw.xpacks.llm.parsers.DoclingParser
  table_parsing_strategy: "docling"
  pdf_pipeline_options:
    table_structure_options:
      mode: "accurate"
  chunk: false
  async_mode: "fully_async"
  cache_strategy: !pw.udfs.DefaultCache {}

# Using PaddleOCR
# $parser: !pw.xpacks.llm.parsers.PaddleOCRParser
#   concatenate_pages: true
#   async_mode: "fully_async"
#   cache_strategy: !pw.udfs.DefaultCache {}

# Using PypdfParser
# $parser: !pw.xpacks.llm.parsers.PypdfParser
#   apply_text_cleanup: true
#   cache_strategy: !pw.udfs.DefaultCache {}

#######################################################################
# Sets up the retriever factory for indexing and retrieving documents.#
#######################################################################

$retriever_factory: !pw.indexing.UsearchKnnFactory
  reserved_space: 1000
  embedder: $embedder
  metric:
    !pw.indexing.USearchMetricKind.COS # Manages the storage and retrieval of documents for the RAG template.


$document_store: !pw.xpacks.llm.document_store.DocumentStore
  docs: $sources
  parser: $parser
  splitter: $splitter
  retriever_factory: $retriever_factory

######################################################################
# Configures the question-answering component using the RAG approach.#
# https://pathway.com/developers/templates/rag-customization/rest-api#
######################################################################

question_answerer: !pw.xpacks.llm.question_answering.BaseRAGQuestionAnswerer
  llm: $llm
  indexer: $document_store
  search_topk: 5
  prompt_template: |
    ### ROLE:
    You are a Knowledge Analyst. Your primary job is to answer the user's question accurately using ONLY the provided context.

    ### TASK:
    1. Read the QUESTION carefully to understand what the user wants.
    2. Provide a clear, professional markdown response using ONLY the CONTEXT.
    3. ONLY IF the question specifically asks for statistics, numbers, comparisons, trends, or rankings AND the context contains real numeric data — then also include a chart configuration.

    ### WHEN TO INCLUDE A CHART (all conditions must be true):
    - The QUESTION explicitly requests data, statistics, numbers, comparisons, trends, percentages, or rankings.
    - The CONTEXT contains real, specific numeric values that directly answer the question.
    - The numbers are NOT fabricated or inferred — they are explicitly stated in the context.

    ### WHEN TO NEVER INCLUDE A CHART:
    - Questions that ask to "summarize", "explain", "describe", "what is", "how does", "list the", "tell me about", "outline", "discuss"
    - Questions about processes, procedures, definitions, guidelines, or policies
    - When you would have to make up or estimate numbers to create the chart
    - When numbers in the context are incidental (e.g., page numbers, section numbers, citation counts) and NOT the main answer

    ### CHART TYPE RULES (only if chart is needed):
    - *LINE*: Trend over time (years, months, days)
    - *BAR*: Comparing independent categories
    - *PIE*: Parts of a whole (must sum to ~100%)

    ### RULES:
    1. Use ONLY the CONTEXT. No outside facts. Never fabricate data.
    2. Use markdown: headings, bold text, clear lists.
    3. If including a chart, use this exact JSON format inside a [GRAPH_CONFIG] tag:
       [GRAPH_CONFIG]
       {{
         "chartType": "bar",
         "title": "Chart Title",
         "data": [{{"label": "A", "value": 10}}, {{"label": "B", "value": 20}}]
       }}
    4. **DATA LIMIT**: Include at most 10 data points in the chart. If there are more, pick only the top/most relevant items. Never dump all rows from a large dataset.

    ### INPUT:
    CONTEXT: {context}
    QUESTION: {query}

    ### BEFORE YOU ANSWER — ASK YOURSELF:
    Is this question asking for numeric data or comparisons? If NO → answer with text only, do NOT include [GRAPH_CONFIG]. If YES → verify the numbers exist in the context, then include the chart.
    **IMPORTANT**: If you decide NOT to include a chart, do NOT mention it. Never write sentences like "No chart is included", "A chart is not applicable", or any reference to charts/graphs/visualization being skipped. Simply end with the narrative answer.

    ANSWER:

terminate_on_error: true
