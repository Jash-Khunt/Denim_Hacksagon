################
# Data Sources.#
################

$sources:
  # File System connector, reading data locally.
  - !pw.io.fs.read 
    # path: data
    path: client
    # path: date
    format: binary
    with_metadata: true

  # Google Drive connector
  # - !pw.io.gdrive.read
  #   object_id: $DIGITAL_DRIVE_ID
  #   service_user_credentials_file: $GOOGLE_APPLICATION_CREDENTIALS
  #   file_name_pattern:
  #     - "*.pdf"
  #     - "*.pptx"
  #     - "*.xlsx"
  #   object_size_limit: null
  #   with_metadata: true
  #   refresh_interval: 30

#######################################
# LLM from both HugginFace and Ollama.#
#######################################

$llm:
  !pw.xpacks.llm.llms.LiteLLMChat # model: "huggingface/meta-llama/Llama-3.1-8B-Instruct"
  model: "huggingface/openai/gpt-oss-120b"
  # model: "huggingface/deepseek-ai/DeepSeek-V3"
  # model: "ollama/mistral:latest"
  retry_strategy: !pw.udfs.ExponentialBackoffRetryStrategy
    max_retries: 6
  cache_strategy: !pw.udfs.DefaultCache {}
  temperature: 0.2
  capacity: 8
  async_mode: "fully_async"

####################################################################
# Specifies the embedder model for converting text into embeddings.#
####################################################################

# Using SentenceTransformer embedder with HuggingFace model

# $embedder: !pw.xpacks.llm.embedders.LiteLLMEmbedder
# model: "ollama/nomic-embed-text:latest"

$embedder: !pw.xpacks.llm.embedders.SentenceTransformerEmbedder
  model: "sentence-transformers/multi-qa-mpnet-base-dot-v1"
  call_kwargs:
    show_progress_bar: False

#######################################################################
# Defines the splitter settings for dividing text into smaller chunks.#
#######################################################################

# $splitter: !pw.xpacks.llm.splitters.TokenCountSplitter
#   max_tokens: 1500

$splitter: !pw.xpacks.llm.splitters.RecursiveSplitter
  chunk_size: 4000
  chunk_overlap: 800
  separators:
    - "\f"
    - "\n\n"
    - "\n"

# $splitter: !pw.xpacks.llm.splitters.NullSplitter
#   cache_strategy: !pw.udfs.DefaultCache {}

##################################################################################
# Configures the parser for processing and extracting information from documents.#
##################################################################################

# Using DoclingParser
# $parser: !pw.xpacks.llm.parsers.DoclingParser
#   table_parsing_strategy: "docling"
#   async_mode: "fully_async"
#   chunk: false
#   cache_strategy: !pw.udfs.DefaultCache {}
$parser: !pw.xpacks.llm.parsers.DoclingParser
  table_parsing_strategy: "docling"
  pdf_pipeline_options:
    table_structure_options:
      mode: "accurate"
  chunk: false
  async_mode: "fully_async"
  cache_strategy: !pw.udfs.DefaultCache {}

# Using PaddleOCR
# $parser: !pw.xpacks.llm.parsers.PaddleOCRParser
#   concatenate_pages: true
#   async_mode: "fully_async"
#   cache_strategy: !pw.udfs.DefaultCache {}

# Using PypdfParser
# $parser: !pw.xpacks.llm.parsers.PypdfParser
#   apply_text_cleanup: true
#   cache_strategy: !pw.udfs.DefaultCache {}

#######################################################################
# Sets up the retriever factory for indexing and retrieving documents.#
#######################################################################

$retriever_factory: !pw.indexing.UsearchKnnFactory
  reserved_space: 1000
  embedder: $embedder
  metric:
    !pw.indexing.USearchMetricKind.COS # Manages the storage and retrieval of documents for the RAG template.


$document_store: !pw.xpacks.llm.document_store.DocumentStore
  docs: $sources
  parser: $parser
  splitter: $splitter
  retriever_factory: $retriever_factory

######################################################################
# Configures the question-answering component using the RAG approach.#
# https://pathway.com/developers/templates/rag-customization/rest-api#
######################################################################

#####################
# Tickets and times #
#####################

question_answerer: !pw.xpacks.llm.question_answering.BaseRAGQuestionAnswerer
  llm: $llm
  indexer: $document_store
  search_topk: 5
  prompt_template: |
    ### ROLE:
    You are a Technical Project Manager and Precision Scheduling Assistant.
    Your task is to extract actionable developer tasks and time-sensitive milestones from client documents to feed into a Jira-integrated notification system.

    ### CURRENT CONTEXT:
    - Timezone: IST
    - Treat the "Reference date for relative deadline calculation" provided in the QUESTION as the authoritative current date.

    ### TASK:
    1. Analyze: Review the text for specific features, architecture needs, or bugs.
    2. Classify Difficulty:
      Easy: Simple UI changes, text updates, or minor bug fixes.
      Medium: New feature logic, API integrations, or state management.
      Hard: Architecture changes, complex security implementations, or migrations.
    3. Assign Field: Determine if the task is Front-end, Back-end, DevOps, Database, or Full-stack.
    4. Identify Dates: Extract every future deadline or timeframe.
    5. Calculate Absolute Dates: Convert relative terms (e.g., "next Friday," "Day 14") into YYYY-MM-DD based on the Current Context.

    ### DATA FORMAT RULES:
    - Output ONLY the JSON blocks wrapped in [TICKET_CONFIG] tags.
    - iso_timestamp: Must be YYYY-MM-DD. If no date is associated with a task, use "null".
    - flag: Use "High" if the requirements are clear, "Low" if vague.
    - human_intervention: Boolean (true/false). Set to true if the flag is "Low".
    - category: Must be "Hard Deadline", "Soft Target", "Milestone", or "N/A".

    ### RULES:
    If including a chart, use this exact JSON format inside a [GRAPH_CONFIG] tag:
      [TICKET_CONFIG]
      {{
      "task": "Professional technical description",
      "difficulty": "Easy/Medium/Hard",
      "field": "Technical Domain",
      "flag": "High/Low",
      "human_intervention": true/false,
      "extracted_date": "Original text or null",
      "iso_timestamp": "YYYY-MM-DD or null",
      "category": "Hard Deadline/Soft Target/Milestone/N/A",
      "urgency_level": "P1/P2/P3"
      }}

    ### EXAMPLE CONVERSION:
    Input: "We need to set up the Firebase NoSQL schema by next Friday."
    Output:
    [TICKET_CONFIG]
    {{
    "task": "Configure Firestore NoSQL schema and document structures",
    "difficulty": "Medium",
    "field": "Database",
    "flag": "High",
    "human_intervention": false,
    "extracted_date": "next Friday",
    "iso_timestamp": "2026-04-10",
    "category": "Milestone",
    "urgency_level": "P2"
    }}

    ### INPUT:
    CONTEXT: {context}
    QUESTION: {query}

    ANSWER:

terminate_on_error: true
